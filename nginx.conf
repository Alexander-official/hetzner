worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # gRPC ve tünel bağlantılarının yarıda kesilmemesi için optimizasyonlar
    client_header_timeout 1h;
    client_body_timeout   1h;
    keepalive_timeout     1h;

    # ALMANYA SUNUCUSU - gRPC için upstream
    upstream germany_grpc {
        server 5.75.192.195:2777;
        server 5.75.192.195:7721;
    }

    # FİNLANDİYA SUNUCUSU - gRPC için upstream
    upstream finland_grpc {
        server 65.109.221.193:2777;
        server 65.109.221.193:7721;
    }

    server {
        # Cloud Run içeride sadece HTTP/2 (gRPC) veya HTTP/1.1 olarak konuşur
        listen 8080;
        
        # Loglarda gördüğümüz /vless/Tun gRPC tünel isteğini yakalıyoruz
        location /vless/Tun {
            # Gelen istekteki host bilgisine göre (google.com / www.google.com) yönlendirme yapıyoruz
            if ($http_host = "google.com") {
                grpc_pass grpc://germany_grpc;
            }
            if ($http_host = "www.google.com") {
                grpc_pass grpc://finland_grpc;
            }
            
            # Eğer host eşleşmezse varsayılan olarak Finlandiya'ya gönder
            grpc_pass grpc://finland_grpc;

            # gRPC tünel tıkama ayarlarını kaldırıyoruz
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Bağlantının canlı kalmasını (tüneli) sağlayan ayarlar
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
        }

        # Tünel dışındaki standart web/api istekleri için ana dizin (isteğe bağlı)
        location / {
            if ($http_host = "google.com") {
                proxy_pass http://germany_grpc;
            }
            proxy_pass http://finland_grpc;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
